<style>
  body {
    background: #f3e8ff;
  }

  .center-card {
    max-width: 520px;
    margin: 60px auto 0 auto;
    background: #fff;
    border-radius: 18px;
    border: 2.5px solid #a259e6;
    box-shadow: 0 4px 24px rgba(162, 89, 230, 0.10),
                0 1.5px 8px rgba(0, 0, 0, 0.10);
    padding: 36px 36px 28px 36px;
    text-align: center;
  }

  .center-card h1 {
    color: #a259e6;
    font-weight: 700;
    margin-bottom: 18px;
  }

  .sol-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
    background: #f8f5ff;
    border-radius: 10px;
    overflow: hidden;
  }

  .sol-table th,
  .sol-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #e0d7f7;
    color: #4b2067;
    text-align: left;
  }

  .sol-table th {
    background: #e9d5ff;
    color: #7c3aed;
    font-weight: 600;
  }

  .sol-table tr:last-child td {
    border-bottom: none;
  }

  .sol-btn {
    background-color: #a259e6;
    color: #fff;
    border: none;
    padding: 7px 18px;
    border-radius: 6px;
    font-weight: 600;
    margin: 0 4px;
    box-shadow: 0 2px 8px rgba(162, 89, 230, 0.10);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    font-size: 1em;
    text-decoration: none;
    display: inline-block;
  }

  .sol-btn:hover {
    background-color: #7c3aed;
    transform: scale(1.06);
  }

  .sol-link {
    color: #a259e6;
    text-decoration: underline;
    margin: 0 10px;
    font-weight: 500;
  }
</style>

<div class="center-card">
  <h1>Solicitudes de amistad</h1>

  <table class="sol-table">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      {% if solicitudes %}
        {% for solicitud in solicitudes %}
          <tr>
            <td>
              <a class="sol-link"
                 href="/perfil?id={{ solicitud['usuarios']['id_usuario'] }}">
                {{ solicitud['usuarios']['username'] }}
              </a>
            </td>

            <td>
              {{ solicitud['fecha_solicitud'] }}
            </td>

            <td>
              <form method="post">
                <input type="hidden" name="id_solicitud" value="{{ solicitud['id_amistad'] }}">
                <button type="submit" name="accion" value="aceptar" class="sol-btn">Aceptar</button>
                <button type="submit" name="accion" value="rechazar" class="sol-btn">Rechazar</button>
              </form>

            </td>
          </tr>
        {% endfor %}

      {% else %}
        <tr>
          <td colspan="3">
            No tienes solicitudes pendientes
          </td>
        </tr>
      {% endif %}
    </tbody>
  </table>

  <a class="sol-btn" href="/ver_perfil/{{id_usuario}}">Volver</a>
  <a class="sol-btn" href="/logout">Cerrar sesión</a>
</div>
