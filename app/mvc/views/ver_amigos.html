<style>
  body {
    background: #f3e8ff;
  }

  .center-card {
    max-width: 520px;
    margin: 60px auto 0 auto;
    background: #fff;
    border-radius: 18px;
    border: 2.5px solid #a259e6;
    box-shadow: 0 4px 24px rgba(162, 89, 230, 0.10),
                0 1.5px 8px rgba(0, 0, 0, 0.10);
    padding: 36px 36px 28px 36px;
    text-align: center;
  }

  .center-card h1 {
    color: #a259e6;
    font-weight: 700;
    margin-bottom: 18px;
  }

  .amigos-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
    background: #f8f5ff;
    border-radius: 10px;
    overflow: hidden;
  }

  .amigos-table th,
  .amigos-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #e0d7f7;
    color: #4b2067;
    text-align: left;
  }

  .amigos-table th {
    background: #e9d5ff;
    color: #7c3aed;
    font-weight: 600;
  }

  .amigos-table tr:last-child td {
    border-bottom: none;
  }

  .amigos-btn {
    background-color: #a259e6;
    color: #fff;
    border: none;
    padding: 7px 18px;
    border-radius: 6px;
    font-weight: 600;
    margin: 0 4px;
    box-shadow: 0 2px 8px rgba(162, 89, 230, 0.10);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    font-size: 1em;
    text-decoration: none;
    display: inline-block;
  }

  .amigos-btn:hover {
    background-color: #7c3aed;
    transform: scale(1.06);
  }

  .amigos-link {
    color: #a259e6;
    text-decoration: underline;
    margin: 0 10px;
    font-weight: 500;
  }
</style>

<div class="center-card">
  <h1>Mis Amigos</h1>

  <table class="amigos-table">
    <thead>
      <tr>
        <th></th>
        <th>Usuario</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      {% if amigos %}
        {% for amigo in amigos %}
          <tr>
            <td style="width: 56px;">
              {% if amigo.foto_path %}
                <img 
                  src="{{ amigo.foto_path }}" 
                  alt="Foto"
                  style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid #a259e6;"
                >
              {% else %}
                <img 
                  src="/static/default_profile.png" 
                  alt="Foto"
                  style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid #a259e6;"
                >
              {% endif %}
            </td>

            <td>
              <a class="amigos-link" href="/ver_perfil/{{ amigo.id_usuario }}">
                {{ amigo.username }}
              </a>
            </td>

            <td>
                <form method="post">
                    <input type="hidden" name="id_usuario1" value="{{ id_usuario }}">
                    <input type="hidden" name="id_usuario2" value="{{ amigo.id_usuario }}">
                    <button type="submit" class="amigos-btn">Eliminar</button>
                </form>
              </a>
            </td>
          </tr>
        {% endfor %}
      {% else %}
        <tr>
          <td colspan="3">Aún no tienes amigos 😢</td>
        </tr>
      {% endif %}
    </tbody>
  </table>

  <a class="amigos-btn" href="/home">Inicio</a>
  <a class="amigos-btn" href="/logout">Cerrar sesión</a>
</div>
