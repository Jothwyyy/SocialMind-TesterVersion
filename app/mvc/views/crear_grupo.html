<html>
  <head>
    <title>Crear Grupo</title>
    <style>
      body {
        background: #f3e8ff;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      .form-container {
        max-width: 540px;
        margin: 48px auto;
        background: #f3e8ff;
        padding: 38px 36px 32px 36px;
        border-radius: 18px;
        border: 2.5px solid #a259e6;
        box-shadow: 0 4px 24px rgba(162,89,230,0.13), 0 1.5px 8px rgba(0,0,0,0.10);
      }
      .form-title {
        font-size: 2em;
        margin-bottom: 18px;
        color: #a259e6;
        text-align: center;
        font-weight: 800;
      }
      .form-group {
        margin-bottom: 18px;
      }
      label {
        font-weight: 500;
        color: #333;
      }
      input[type="text"], textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1.5px solid #a259e6;
        margin-top: 6px;
        font-size: 1em;
        background: #fff0fa;
      }
      input[type="file"] {
        margin-top: 8px;
      }
      .btn-primary {
        background: #a259e6;
        color: #fff;
        padding: 10px 24px;
        border: none;
        border-radius: 7px;
        font-size: 1.1em;
        cursor: pointer;
        font-weight: 600;
        border: 2.5px solid #a259e6;
        transition: background .18s, color .18s;
      }
      .btn-primary:hover {
        background: #8646c7;
      }
      .link {
        background:#fff;
        color:#a259e6;
        border:2px solid #a259e6;
        border-radius:8px;
        padding:10px 28px;
        font-weight:600;
        text-decoration:none;
        font-size:1.1em;
        transition:background .18s, color .18s;
        margin-bottom: 18px;
        display: inline-block;
      }
      .error-msg {
        color: #d9534f;
        font-weight: 600;
        margin-bottom: 18px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <div class="form-title">Crear nuevo grupo</div>
      <a href="/grupos" class="link">Volver a grupos</a>
      {%if error%}
        <div class="error-msg">{{error}}</div>
      {%endif%}
      <form method="post" enctype="multipart/form-data">
        <div class="form-group">
          <label>Nombre del grupo:</label>
          <input type="text" name="nombre" required>
        </div>
        <div class="form-group">
          <label>Descripción:</label>
          <textarea name="descripcion" required></textarea>
        </div>
        <div class="form-group">
          <label>Imagen de perfil:</label>
          <input type="file" name="imagen_perfil" accept="image/*" required>
        </div>
        <div class="form-group">
          <label>Imagen de banner:</label>
          <input type="file" name="imagen_banner" accept="image/*" required>
        </div>
        <button type="submit" class="btn-primary">Crear grupo</button>
      </form>
    </div>
  </body>
</html>
